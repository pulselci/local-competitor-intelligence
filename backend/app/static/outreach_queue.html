<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse LCI — Outreach Queue</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: #f0f4f9; color: #172033; min-height: 100vh; }

  .topbar { background: #122033; color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; }
  .topbar-sub { font-size: 12px; color: #8a9fbe; }

  /* Tab nav */
  .tab-nav { background: #122033; border-top: 1px solid #1e3550; display: flex; gap: 0; padding: 0 28px; }
  .tab-btn { font-size: 13px; font-weight: 600; color: #8a9fbe; padding: 10px 18px; cursor: pointer; border: none; background: none; border-bottom: 3px solid transparent; transition: color 0.15s; letter-spacing: 0.02em; }
  .tab-btn:hover { color: #c8d8f0; }
  .tab-btn.active { color: #fff; border-bottom-color: #4a80e8; }

  .stats-bar { background: #fff; border-bottom: 1px solid #dce6f5; padding: 12px 28px; display: flex; gap: 24px; }
  .stat { font-size: 13px; color: #5c6f91; }
  .stat strong { color: #122033; font-size: 16px; margin-right: 4px; }

  .filter-bar { padding: 16px 28px 0; display: flex; gap: 10px; align-items: center; }
  .filter-bar label { font-size: 13px; color: #5c6f91; }
  select { font-size: 13px; padding: 6px 10px; border: 1px solid #c8d8ee; border-radius: 8px; background: #fff; color: #172033; }

  .queue { padding: 20px 28px; display: flex; flex-direction: column; gap: 16px; max-width: 900px; }

  .card { background: #fff; border: 1px solid #dce6f5; border-radius: 14px; overflow: hidden; }
  .card-header { padding: 16px 20px 12px; display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #f0f4f9; }
  .card-title { font-size: 16px; font-weight: 700; color: #122033; }
  .card-meta { font-size: 12px; color: #62738f; margin-top: 3px; }
  .badge { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 20px; }
  .badge-draft { background: #e8f0ff; color: #2c5eff; }
  .badge-no-email { background: #fff3e0; color: #e65100; }
  .badge-sent { background: #e8f5e9; color: #2e7d32; }
  .badge-skipped { background: #f5f5f5; color: #9e9e9e; }
  .badge-reseller { background: #ede7f6; color: #5b21b6; }
  .badge-referral { background: #e0f2fe; color: #075985; }
  .badge-both { background: #f0fdf4; color: #15803d; }

  .card-body { padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .info-block h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #8a9ab5; font-weight: 700; margin-bottom: 6px; }
  .info-block p { font-size: 13px; color: #30415f; }
  .info-block a { color: #2c5eff; text-decoration: none; font-size: 13px; }
  .info-block a:hover { text-decoration: underline; }

  .email-preview { grid-column: 1 / -1; }
  .email-preview textarea { width: 100%; height: 180px; font-size: 13px; font-family: inherit; line-height: 1.6; color: #172033; border: 1px solid #c8d8ee; border-radius: 8px; padding: 12px; resize: vertical; }
  .email-subject input { width: 100%; font-size: 13px; font-family: inherit; color: #172033; border: 1px solid #c8d8ee; border-radius: 8px; padding: 8px 12px; }

  /* A/B test selector */
  .ab-selector { grid-column: 1 / -1; background: #f8fbff; border: 1px solid #dce6f5; border-radius: 10px; padding: 12px 14px; }
  .ab-selector-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #8a9ab5; margin-bottom: 8px; }
  .ab-group-btns { display: flex; gap: 6px; margin-bottom: 10px; }
  .ab-group-btn { font-size: 12px; font-weight: 700; padding: 5px 14px; border-radius: 20px; border: 2px solid #c8d8ee; background: #fff; color: #62738f; cursor: pointer; transition: all 0.15s; }
  .ab-group-btn.active-a { background: #4a80e8; border-color: #4a80e8; color: #fff; }
  .ab-group-btn.active-b { background: #7c3aed; border-color: #7c3aed; color: #fff; }
  .ab-subject-picker { display: flex; flex-direction: column; gap: 5px; }
  .ab-subject-option { font-size: 12px; padding: 6px 10px; border-radius: 7px; border: 1px solid #dce6f5; background: #fff; color: #30415f; cursor: pointer; text-align: left; transition: all 0.12s; }
  .ab-subject-option:hover { border-color: #4a80e8; background: #f0f4ff; }
  .ab-subject-option.selected { border-color: #4a80e8; background: #eaf0ff; font-weight: 600; color: #122033; }
  .ab-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-right: 5px; }
  .ab-badge-a { background: #dbeafe; color: #1e40af; }
  .ab-badge-b { background: #ede9fe; color: #5b21b6; }

  .contact-email-row { grid-column: 1 / -1; display: flex; gap: 10px; align-items: center; }
  .contact-email-row input { flex: 1; font-size: 13px; padding: 8px 12px; border: 1px solid #c8d8ee; border-radius: 8px; }

  .card-footer { padding: 12px 20px; border-top: 1px solid #f0f4f9; display: flex; gap: 10px; justify-content: flex-end; align-items: center; }
  .msg { font-size: 12px; color: #62738f; flex: 1; }
  .msg.success { color: #2e7d32; }
  .msg.error { color: #c62828; }

  button { font-size: 13px; font-weight: 600; padding: 8px 18px; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-approve { background: #122033; color: #fff; }
  .btn-skip { background: #f0f4f9; color: #5c6f91; }
  .btn-save { background: #e8f0ff; color: #2c5eff; }

  .empty { text-align: center; padding: 60px 20px; color: #8a9ab5; font-size: 15px; }
  .loading { text-align: center; padding: 60px; color: #8a9ab5; }

  .review-pill { display: inline-flex; align-items: center; gap: 5px; background: #f0f4f9; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; color: #30415f; }

  /* Agency add form */
  .add-agency-form { background: #fff; border-bottom: 1px solid #dce6f5; padding: 20px 28px; }
  .add-agency-form .form-title { font-size: 13px; font-weight: 700; color: #122033; margin-bottom: 14px; }
  .add-agency-form .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; align-items: flex-end; }
  .add-agency-form .form-field { display: flex; flex-direction: column; gap: 3px; }
  .add-agency-form .form-field label { font-size: 11px; color: #62738f; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
  .add-agency-form .form-field input,
  .add-agency-form .form-field select,
  .add-agency-form .form-field textarea { font-size: 13px; padding: 7px 10px; border: 1px solid #c8d8ee; border-radius: 8px; font-family: inherit; color: #172033; background: #fff; }
  .add-agency-form .form-field textarea { resize: vertical; height: 80px; }
  .add-agency-form .toggle-btn { font-size: 12px; color: #2c5eff; background: none; border: none; padding: 0; cursor: pointer; font-weight: 600; }
  .add-agency-form .toggle-btn:hover { opacity: 0.75; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <div class="topbar-title">Pulse LCI — Outreach Queue</div>
    <div class="topbar-sub">Review and approve cold email drafts before they send</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn-skip" id="clear-btn" onclick="handleClear()" style="font-size:12px;padding:6px 14px;color:#c62828;">🗑 Clear Queue</button>
    <button class="btn-save" onclick="handleRefresh()" style="font-size:12px;padding:6px 14px;">↻ Refresh</button>
  </div>
</div>

<!-- Tab nav -->
<div class="tab-nav">
  <button class="tab-btn active" id="tab-btn-business" onclick="switchTab('business')">Business Outreach</button>
  <button class="tab-btn" id="tab-btn-agency" onclick="switchTab('agency')">Agency Pipeline</button>
</div>

<!-- ═══════════════════════════════════════════════════════ BUSINESS TAB -->
<div id="tab-business">

<div class="stats-bar" id="stats-bar">
  <div class="stat"><strong id="stat-draft">—</strong> ready to review</div>
  <div class="stat"><strong id="stat-sent">—</strong> sent</div>
  <div class="stat"><strong id="stat-skipped">—</strong> skipped</div>
  <div class="stat"><strong id="stat-no-email">—</strong> no email found</div>
</div>

<div style="background:#fff; border-bottom: 1px solid #dce6f5; padding: 16px 28px;">
  <div style="font-size: 13px; font-weight: 700; color: #122033; margin-bottom: 10px;">Find New Prospects</div>

  <div style="display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px;">
    <div>
      <label style="font-size: 11px; color: #62738f; display:block; margin-bottom:3px;">City</label>
      <input id="disc-city" type="text" placeholder="Chicago" style="font-size:13px; padding:7px 10px; border:1px solid #c8d8ee; border-radius:8px; width:140px;">
    </div>
    <div>

    </div>
    <div style="flex:1; min-width:220px;">
      <label style="font-size: 11px; color: #62738f; display:block; margin-bottom:3px;">Business Type</label>
      <input id="disc-categories" type="text" placeholder="Select a preset below or type custom terms" style="font-size:13px; padding:7px 10px; border:1px solid #c8d8ee; border-radius:8px; width:100%;">
    </div>
    <button class="btn-approve" id="disc-btn" onclick="startDiscovery()" style="padding:8px 20px; white-space:nowrap;">🔍 Find Prospects</button>
  </div>

  <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:6px;">
    <span style="font-size:11px; color:#8a9ab5; font-weight:700; text-transform:uppercase; letter-spacing:.06em; margin-right:4px;">Quick select:</span>
    <button class="btn-skip" onclick="setCategory('dental office,dentist,dental clinic,family dentistry')" style="font-size:12px;padding:4px 12px;border-radius:20px;">🦷 Dental</button>
    <button class="btn-skip" onclick="setCategory('auto repair shop,auto mechanic,car repair,automotive service')" style="font-size:12px;padding:4px 12px;border-radius:20px;">🔧 Auto Repair</button>
    <button class="btn-skip" onclick="setCategory('medical spa,med spa,medspa,aesthetic clinic,laser spa')" style="font-size:12px;padding:4px 12px;border-radius:20px;">💆 Med Spa</button>
    <button class="btn-skip" onclick="setCategory('hvac contractor,air conditioning contractor,heating contractor,hvac service')" style="font-size:12px;padding:4px 12px;border-radius:20px;">❄️ HVAC</button>
    <button class="btn-skip" onclick="setCategory('plumber,plumbing service,roofing contractor,electrician,handyman')" style="font-size:12px;padding:4px 12px;border-radius:20px;">🏠 Home Services</button>
    <button class="btn-skip" onclick="setCategory('chiropractor,chiropractic clinic')" style="font-size:12px;padding:4px 12px;border-radius:20px;">🩺 Chiro</button>
    <button class="btn-skip" onclick="setCategory('gym,fitness center,personal trainer')" style="font-size:12px;padding:4px 12px;border-radius:20px;">💪 Gym</button>
  </div>
  <div style="font-size:11px; color:#8a9ab5;">
    <span id="disc-status"></span>
  </div>
</div>

<div class="filter-bar">
  <label for="status-filter">Show:</label>
  <select id="status-filter" onchange="loadQueue()">
    <option value="draft_ready">Ready to send</option>
    <option value="no_email">No email found</option>
    <option value="sent">Sent</option>
    <option value="skipped">Skipped</option>
  </select>
</div>

<div class="queue" id="queue">
  <div class="loading">Loading prospects…</div>
</div>

</div><!-- /tab-business -->

<!-- ═══════════════════════════════════════════════════════ AGENCY TAB -->
<div id="tab-agency" style="display:none;">

<div class="stats-bar" id="agency-stats-bar">
  <div class="stat"><strong id="agency-stat-total">—</strong> total agencies</div>
  <div class="stat"><strong id="agency-stat-draft">—</strong> ready to send</div>
  <div class="stat"><strong id="agency-stat-sent">—</strong> sent</div>
  <div class="stat"><strong id="agency-stat-skipped">—</strong> skipped</div>
</div>

<div class="add-agency-form">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
    <div class="form-title" style="margin-bottom:0;">Add Agency</div>

  <div id="add-agency-fields" style="display:none;">
    <div class="form-row">

  <div style="display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 10px;">
    <div>

  <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-bottom:6px;">

    <button class="btn-skip" onclick="setAgencyCategory('digital marketing agency,marketing agency')" style="font-size:12px;padding:4px 12px;border-radius:20px;">📣 Digital Marketing</button>
    <button class="btn-skip" onclick="setAgencyCategory('web design company,web development agency')" style="font-size:12px;padding:4px 12px;border-radius:20px;">🖥 Web Design</button>
    <button class="btn-skip" onclick="setAgencyCategory('SEO agency,search engine optimization')" style="font-size:12px;padding:4px 12px;border-radius:20px;">🔍 SEO</button>
    <button class="btn-skip" onclick="setAgencyCategory('advertising agency,marketing consultant')" style="font-size:12px;padding:4px 12px;border-radius:20px;">📊 Advertising</button>

<script>
const API = window.location.origin;
let currentTab = 'business';

// ─── Tab switching ────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-business').style.display = tab === 'business' ? '' : 'none';
  document.getElementById('tab-agency').style.display = tab === 'agency' ? '' : 'none';
  document.getElementById('tab-btn-business').classList.toggle('active', tab === 'business');
  document.getElementById('tab-btn-agency').classList.toggle('active', tab === 'agency');

  document.getElementById('clear-btn').style.display = tab === 'business' ? '' : 'none';

  if (tab === 'business') {
    loadQueue();
  } else {
    loadAgencies();
    loadAgencyStats();
  }
}

function handleRefresh() {
  if (currentTab === 'business') { loadQueue(); loadStats(); }
  else { loadAgencies(); loadAgencyStats(); }
}

function handleClear() {
  clearQueue();
}

// ─── Business tab ─────────────────────────────────────────────────────────────

async function loadStats() {
  try {
    const r = await fetch(`${API}/outreach/stats`);
    const data = await r.json();
    document.getElementById('stat-draft').textContent = data['draft_ready'] || 0;
    document.getElementById('stat-sent').textContent = data['sent'] || 0;
    document.getElementById('stat-skipped').textContent = data['skipped'] || 0;
    document.getElementById('stat-no-email').textContent = data['no_email'] || 0;
  } catch(e) { console.warn('stats failed', e); }
}

async function loadQueue() {
  const status = document.getElementById('status-filter').value;
  const queue = document.getElementById('queue');
  queue.innerHTML = '<div class="loading">Loading…</div>';
  loadStats();

  try {
    const r = await fetch(`${API}/outreach/queue?status=${status}&limit=50`);
    if (!r.ok) throw new Error(await r.text());
    const prospects = await r.json();

    if (!prospects.length) {
      queue.innerHTML = `<div class="empty">No prospects with status "${status}".<br>Run <code>python -m outreach.discover --city "YourCity" --state "TX"</code> to discover more.</div>`;
      return;
    }

    queue.innerHTML = '';
    prospects.forEach(p => queue.appendChild(renderCard(p)));
  } catch(e) {
    queue.innerHTML = `<div class="empty" style="color:#c62828">Failed to load: ${e.message}</div>`;
  }
}

function renderCard(p) {
  const div = document.createElement('div');
  div.className = 'card';
  div.id = `card-${p.id}`;

  const badgeClass = {
    draft_ready: 'badge-draft',
    no_email: 'badge-no-email',
    sent: 'badge-sent',
    skipped: 'badge-skipped',
  }[p.status] || 'badge-draft';

  const badgeLabel = {
    draft_ready: 'Ready',
    no_email: 'No Email',
    sent: 'Sent',
    skipped: 'Skipped',
  }[p.status] || p.status;

  const reviewPill = p.reviews_count
    ? `<span class="review-pill">⭐ ${p.rating || '—'} &nbsp;·&nbsp; ${p.reviews_count} reviews</span>`
    : '';

  const compInfo = p.top_competitor_name
    ? `vs. ${p.top_competitor_name} (${p.top_competitor_reviews} reviews)`
    : 'No competitor data';

  const isReadOnly = p.status === 'sent' || p.status === 'skipped';
  const readOnly = isReadOnly ? 'readonly' : '';
  const readOnlyStyle = isReadOnly ? 'background:#f9fafb;color:#888;' : '';

  div.innerHTML = `
    <div class="card-header">
      <div>
        <div class="card-title">${escHtml(p.business_name)}</div>
        <div class="card-meta">${escHtml(p.address || '')} &nbsp;${reviewPill}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">

const AB_SUBJECTS = {
  A: [
    { label: 'A-S1', text: 'Your competitors are pulling ahead on reviews' },
    { label: 'A-S2', text: 'Something I noticed about [business type] in [city]' },
    { label: 'A-S3', text: 'How you stack up against other [business type] in [city]' },
    { label: 'A-S4', text: 'The review gap between you and [Competitor] is wider than you think' },
    { label: 'A-S5', text: "One number that's costing local [business type] owners clients" },
  ],
  B: [
    { label: 'B-S1', text: 'Quick question about your competitors' },
    { label: 'B-S2', text: 'Curious — do you track your local competition?' },
    { label: 'B-S3', text: 'I made something you might find useful' },
    { label: 'B-S4', text: 'Who are your top 2-3 competitors?' },
    { label: 'B-S5', text: 'Free competitive report — no link to click' },
  ],
};

function renderSubjectOptions(pid, group, selectedLabel) {
  if (!group || !AB_SUBJECTS[group]) return '';
  return AB_SUBJECTS[group].map(s => {
    const sel = s.label === selectedLabel ? ' selected' : '';
    return `<button class="ab-subject-option${sel}" onclick="selectAbSubject('${pid}','${s.label}',${JSON.stringify(s.text)})">`
      + `<span class="ab-badge ${group === 'A' ? 'ab-badge-a' : 'ab-badge-b'}">${s.label}</span>${escHtml(s.text)}</button>`;
  }).join('');
}

function selectAbGroup(id, group) {
  const el = document.getElementById(`ab-${id}`);
  if (!el) return;
  el.dataset.group = group;
  el.dataset.label = '';
  const btns = el.querySelectorAll('.ab-group-btn');
  btns.forEach(b => { b.className = 'ab-group-btn'; });
  btns[group === 'A' ? 0 : 1].className = `ab-group-btn active-${group.toLowerCase()}`;
  const picker = document.getElementById(`ab-picker-${id}`);
  picker.style.display = '';
  picker.innerHTML = renderSubjectOptions(id, group, '');
}

function selectAbSubject(id, label, text) {
  const el = document.getElementById(`ab-${id}`);
  if (!el) return;
  el.dataset.label = label;
  const picker = document.getElementById(`ab-picker-${id}`);
  picker.querySelectorAll('.ab-subject-option').forEach(b => b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  const subjectInput = document.getElementById(`subject-${id}`);
  if (subjectInput && !subjectInput.readOnly) subjectInput.value = text;
}

function clearAbGroup(id) {
  const el = document.getElementById(`ab-${id}`);
  if (!el) return;
  el.dataset.group = '';
  el.dataset.label = '';
  const picker = document.getElementById(`ab-picker-${id}`);
  picker.style.display = 'none';
  picker.innerHTML = '';
  el.querySelectorAll('.ab-group-btn').forEach(b => { b.className = 'ab-group-btn'; });
}

async function loadAgencyStats() {
  try {
    const r = await fetch(`${API}/outreach/agencies?status=all&limit=500`);
    const data = await r.json();
    document.getElementById('agency-stat-total').textContent = data.length;
    document.getElementById('agency-stat-draft').textContent = data.filter(a => a.status === 'draft_ready').length;
    document.getElementById('agency-stat-sent').textContent = data.filter(a => a.status === 'sent').length;
    document.getElementById('agency-stat-skipped').textContent = data.filter(a => a.status === 'skipped').length;
  } catch(e) { console.warn('agency stats failed', e); }
}

async function loadAgencies() {
  const status = document.getElementById('agency-status-filter').value;
  const queue = document.getElementById('agency-queue');
  queue.innerHTML = '<div class="loading">Loading…</div>';

  try {
    const r = await fetch(`${API}/outreach/agencies?status=${status}&limit=100`);
    if (!r.ok) throw new Error(await r.text());
    const agencies = await r.json();

    if (!agencies.length) {
      queue.innerHTML = `<div class="empty">No agencies yet.<br>Use the form above to add your first agency prospect.</div>`;
      return;
    }

    queue.innerHTML = '';
    agencies.forEach(a => queue.appendChild(renderAgencyCard(a)));
  } catch(e) {
    queue.innerHTML = `<div class="empty" style="color:#c62828">Failed to load: ${e.message}</div>`;
  }
}

async function addAgency() {
  const name = document.getElementById('ag-name').value.trim();
  if (!name) {
    document.getElementById('add-agency-msg').textContent = 'Agency name is required.';
    document.getElementById('add-agency-msg').style.color = '#c62828';
    return;
  }

  const btn = document.getElementById('add-agency-btn');
  btn.disabled = true;
  btn.textContent = 'Adding…';

  const payload = {
    business_name: name,
    contact_email: document.getElementById('ag-email').value.trim() || null,
    website: document.getElementById('ag-website').value.trim() || null,
    city: document.getElementById('ag-city').value.trim() || null,
    state: document.getElementById('ag-state').value.trim().toUpperCase() || null,
    partnership_type: document.getElementById('ag-type').value,
    notes: document.getElementById('ag-notes').value.trim() || null,
    draft_subject: document.getElementById('ag-subject').value.trim() || null,
    draft_body: document.getElementById('ag-body').value.trim() || null,
  };

  try {
    const r = await fetch(`${API}/outreach/agency`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error(await r.text());

    // Clear form
    ['ag-name','ag-email','ag-website','ag-city','ag-state','ag-notes','ag-subject','ag-body'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('add-agency-msg').textContent = `✓ ${name} added to pipeline.`;
    document.getElementById('add-agency-msg').style.color = '#2e7d32';
    loadAgencies();
    loadAgencyStats();
  } catch(e) {
    document.getElementById('add-agency-msg').textContent = `Failed: ${e.message}`;
    document.getElementById('add-agency-msg').style.color = '#c62828';
  } finally {
    btn.disabled = false;
    btn.textContent = '+ Add to Pipeline';
  }
}

async function skipAgency(id) {
  if (!confirm('Skip this agency?')) return;
  try {
    const r = await fetch(`${API}/outreach/${id}/skip`, { method: 'POST' });
    if (!r.ok) throw new Error(await r.text());
    document.getElementById(`card-${id}`).remove();
    loadAgencyStats();
  } catch(e) {
    setMsg(id, `Failed: ${e.message}`, true);
  }
}

function setMsg(id, text, isError) {
  const el = document.getElementById(`msg-${id}`);
  if (!el) return;
  el.textContent = text;
  el.className = 'msg ' + (isError ? 'error' : 'success');
}

async function saveDraft(id) {
  const email = document.getElementById(`email-${id}`)?.value.trim();
  const subject = document.getElementById(`subject-${id}`)?.value.trim();
  const body = document.getElementById(`body-${id}`)?.value.trim();

  // Collect A/B selection
  const abEl = document.getElementById(`ab-${id}`);
  const abGroup = abEl?.dataset.group || null;
  const abLabel = abEl?.dataset.label || null;

  const payload = {
    contact_email: email || null,
    draft_subject: subject || null,
    draft_body: body || null,
  };
  if (abGroup) payload.ab_group = abGroup;
  if (abLabel) payload.ab_subject_label = abLabel;

  try {
    const r = await fetch(`${API}/outreach/${id}/draft`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload),
    });
    if (!r.ok) throw new Error(await r.text());
    setMsg(id, 'Saved.', false);
    loadStats();
  } catch(e) {
    setMsg(id, `Save failed: ${e.message}`, true);
  }
}

function skip(id) {
  if (!confirm('Skip this prospect?')) return;
  fetch(`${API}/outreach/${id}/skip`, { method: 'POST' })
    .then(r => { if (!r.ok) throw new Error(r.statusText); })
    .then(() => { document.getElementById(`card-${id}`).remove(); loadStats(); })
    .catch(e => setMsg(id, `Failed: ${e.message}`, true));
}

async function approve(id, isAgency = false) {
  const email = document.getElementById(`email-${id}`)?.value.trim();
  if (!email) {
    setMsg(id, 'Add a contact email first.', true);
    return;
  }
  if (!confirm(`Send this email to ${email}?`)) return;

  await saveDraft(id);

  try {
    const r = await fetch(`${API}/outreach/${id}/approve`, { method: 'POST' });
    const text = await r.text();
    let data = {};
    try { data = JSON.parse(text); } catch(_) {}
    if (!r.ok) throw new Error(data.detail || text.slice(0, 120) || r.statusText);
    setMsg(id, `✓ Sent to ${data.sent_to}`, false);
    setTimeout(() => isAgency ? loadAgencies() : loadQueue(), 1200);
    if (isAgency) loadAgencyStats(); else loadStats();
  } catch(e) {
    setMsg(id, `Send failed: ${e.message}`, true);
  }
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function clearQueue() {
  if (!confirm('Clear all queued prospects? Sent records will be kept.')) return;
  try {
    const r = await fetch(`${API}/outreach/clear`, { method: 'POST' });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || r.statusText);
    loadQueue();
    loadStats();
  } catch(e) {
    alert(`Clear failed: ${e.message}`);
  }
}

async function startDiscovery() {
  const city = document.getElementById('disc-city').value.trim();
  const state = document.getElementById('disc-state').value.trim().toUpperCase();
  const categories = document.getElementById('disc-categories').value.trim();
  const btn = document.getElementById('disc-btn');
  const status = document.getElementById('disc-status');

  if (!city || !state || !categories) {
    status.textContent = 'Fill in city, state, and at least one category.';
    status.style.color = '#c62828';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ Running...';
  status.style.color = '#62738f';
  status.textContent = 'Discovery started — this takes a few minutes. Queue will update automatically.';

  try {
    const r = await fetch(`${API}/outreach/discover`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ city, state, categories }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.detail || r.statusText);
    status.textContent = data.message;
    status.style.color = '#2e7d32';

    const poll = setInterval(async () => {
      try {
        const sr = await fetch(`${API}/outreach/discover/status`);
        const sd = await sr.json();
        if (!sd.running) {
          clearInterval(poll);
          btn.disabled = false;
          btn.textContent = '🔍 Find Prospects';
          status.textContent = sd.last || 'Done.';
          loadQueue();
          loadStats();
        }
      } catch(_) { clearInterval(poll); }
    }, 5000);

  } catch(e) {
    status.textContent = `Failed: ${e.message}`;
    status.style.color = '#c62828';
    btn.disabled = false;
    btn.textContent = '🔍 Find Prospects';
  }
}
